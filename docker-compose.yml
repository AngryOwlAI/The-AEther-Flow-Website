services:
  web:
    build:
      context: .
      target: deps
    working_dir: /app
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "4321:4321"
    environment:
      ASTRO_TELEMETRY_DISABLED: "1"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - python_venv:/app/.venv

volumes:
  node_modules:
  python_venv:
