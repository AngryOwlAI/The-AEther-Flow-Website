    objective: "Make curator report generation and checking accept one explicit immutable upstream commit while preserving live-HEAD behavior when no pin is supplied, then prove that a moving upstream HEAD cannot invalidate a pinned review snapshot."
    acceptance_criteria:
      - "The curator accepts an explicit full upstream commit through AETHER_FLOW_SOURCE_COMMIT or --source-commit and records that exact resolved commit and commit date."
      - "An invalid, missing, or non-commit pin fails closed; omitting the pin preserves the existing live-HEAD behavior."
      - "Focused tests prove that advancing upstream HEAD does not change a report or invalidate exact acknowledgements when the earlier reviewed commit is pinned."
      - "The checked-in AFDOC-038 curator report and all 58 exact acknowledgements pass against c6aa66b9a7412f14c6573dd0467b82ea11310c20 without rewriting scientific content or curator evidence."
    validators:
      - id: "afdoc-r001-01"
        command: "python3 -m pytest tests/test_curator_reports.py tests/test_curator_acknowledgements.py -q"
        required: true
      - id: "afdoc-r001-02"
        command: "/usr/bin/env AETHER_FLOW_SOURCE_COMMIT=c6aa66b9a7412f14c6573dd0467b82ea11310c20 python3 scripts/run_curator.py --check"
        required: true
      - id: "afdoc-r001-03"
        command: "git diff --check"
        required: true
