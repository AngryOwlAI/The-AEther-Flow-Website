      - id: "cloudflare_deployment"
        status: "not_required"
        reason: "The recovery plan withholds deployment authority."
      - id: "upstream_source_project_writes"
        status: "blocked"
        reason: "Every upstream source-project write remains forbidden."
    stop_conditions:
      - "Plan, task, binding, thread, revision, repository, topology, or control identity differs."
