    status: "approved"
    trigger: "Route-level diagram figure wiring, content-module wiring, and minimal shared figure styles."
  - id: "public_downloadable_assets"
    status: "approved"
    trigger: "Public static comprehension PNGs under `public/assets/diagrams/comprehension/` may be added or regenerated from tracked Mermaid sources."
