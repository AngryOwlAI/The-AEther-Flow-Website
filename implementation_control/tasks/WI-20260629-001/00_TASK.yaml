approval_gates:
  public_claim_changes:
    status: "not_required"
    reason: "No public content or source-derived claim text is in scope."
  source_refresh_uncertainty:
    status: "not_required"
    reason: "No source snapshot or upstream claim refresh is in scope."
  broad_navigation_or_route_retirement:
    status: "not_required"
    reason: "No public route or navigation change is in scope."
  shared_visual_systems:
    status: "not_required"
    reason: "No CSS, component, layout, SVG, or visual asset change is in scope."
  public_downloadable_assets:
    status: "not_required"
    reason: "No public file publication is in scope."
  public_manifest_authority_records:
    status: "not_required"
    reason: "No public manifest write is in scope."
  git_push:
    status: "not_required"
    reason: "Push is explicitly out of scope."
  cloudflare_deployment:
    status: "not_required"
    reason: "Deployment is explicitly out of scope."
  upstream_source_project_writes:
    status: "blocked"
    reason: "The website implementation-control system is read-only toward the upstream source project."

required_validators:
  - id: "git-diff-check"
    command: "git diff --check"
    required: true
  - id: "implementation-control"
    command: "npm run validate:implementation-control"
    required: true
  - id: "python-tests"
    command: ".venv/bin/python -m pytest"
    required: true
  - id: "manual-control-record-inspection"
    command: "manual inspection of implementation_control YAML and Markdown records"
    required: true

stop_conditions:
  - "An upstream source-project write path appears in allowed_writes."
  - "A write outside the explicit bootstrap allowlist becomes necessary."
  - "A public route, public asset, or public manifest change becomes necessary."
  - "A source-derived public claim would be changed."
  - "The work would require more than one active job in this invocation."
  - "Required validation fails."
  - "Unrelated dirty work overlaps an allowed write path."

checkpoint_expectations:
  automated_checkpoint_command_available: true
  current_packet_closeout: "Run required validation, write completion and handoff records, and use checkpoint:implementation for one local commit."
  future_checkpoint_policy: "After Task 4, checkpointing must stage only active-job allowed write paths after validators pass."

