approval_gates:
  public_claim_changes:
    status: "not_required"
    reason: "The packet writes planning and control material only and does not change public route copy."
  source_refresh_uncertainty:
    status: "not_required"
    reason: "No source snapshot, upstream claim refresh, generated publication refresh, wiki refresh, or local retrieval refresh is in scope."
  broad_navigation_or_route_retirement:
    status: "not_required"
    reason: "No public navigation or route change is in scope."
  shared_visual_systems:
    status: "not_required"
    reason: "No CSS, component, layout, SVG, or visual asset change is in scope."
  public_downloadable_assets:
    status: "not_required"
    reason: "No public file publication is in scope."
  public_manifest_authority_records:
    status: "not_required"
    reason: "No public manifest write is in scope."
  git_push:
    status: "not_required"
    reason: "Push is explicitly out of scope."
  cloudflare_deployment:
    status: "not_required"
    reason: "Deployment is explicitly out of scope."
  upstream_source_project_writes:
    status: "blocked"
    reason: "The website implementation-control system is read-only toward the upstream source project."

required_validators:
  - id: "git-diff-check"
    command: "git diff --check"
    required: true
  - id: "implementation-control"
    command: "npm run validate:implementation-control"
    required: true
  - id: "python-tests"
    command: ".venv/bin/python -m pytest"
    required: true
  - id: "manual-control-record-inspection"
    command: "manual inspection of implementation_control YAML and Markdown records"
    required: true

stop_conditions:
  - "A write outside the explicit final-review allowlist becomes necessary."
  - "Any upstream source-project write is proposed."
  - "Any source bundle dataset, source snapshot, public route, public asset, public manifest, push, deploy, generated publication output, wiki, or .local retrieval-layer change becomes necessary."
  - "A source-derived public claim would be changed."
  - "Required validation fails."
  - "The active job cannot be completed within one bounded packet."

checkpoint_expectations:
  automated_checkpoint_command_available: true
  staging_allowed_by_this_job: true
  closeout: "Use npm run checkpoint:implementation after completion evidence exists. Do not push or deploy."

