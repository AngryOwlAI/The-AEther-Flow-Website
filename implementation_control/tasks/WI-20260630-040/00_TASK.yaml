requirements:
  - "Implement `/resources/reading-paths/`, `/resources/repository-map/`, `/resources/site-builder-guide/`, and the greenfield reset of `/resources/diagrams/`."
  - "Reading paths must guide general and specialist readers through new internal routes before provenance or source archaeology."
  - "Repository map must classify folder families by authority, derivative, retrieval, tooling, cache, archival, and edit/read policy without treating topology as source authority."
  - "Site-builder guide must expose the source-bundle schema, page-family source bundle index, build-first checklist, contributor handoff requirements, and staleness handling."
  - "Diagram Gallery must preserve format, provenance, static generated diagram discipline, and non-authority behavior while removing old inventory unless individual diagrams are explicitly reapproved."
  - "Resource pages must not render a dedicated source-authority section component."
  - "Update public route/provenance manifests and the review ledger for the four GF-012 routes."
  - "Do not add dependencies, push, deploy, refresh upstream sources, regenerate diagrams, publish new diagrams, refresh generated derivatives, or mutate the upstream research repository."

goal: "Complete GF-012 by building the greenfield Resources reading paths, repository map, site-builder guide, and diagram gallery routes under fresh live control."

