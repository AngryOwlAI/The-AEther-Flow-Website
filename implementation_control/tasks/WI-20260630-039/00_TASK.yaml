requirements:
  - "Implement `/resources/generated-derivatives/`, `/resources/retrieval-layers/`, `/resources/publication-process/`, and `/resources/library/` as the second Resources vertical slice."
  - "Generated derivatives page must visibly label derivative status and must not treat HTML, PDFs, GitHub-facing Markdown, wiki, Obsidian, semantic extracts, or `.local` caches as canonical authority."
  - "Retrieval layers page must label navigation-only behavior and require source inspection before retrieval affects claims."
  - "Publication process page must distinguish publication quality, source specs, briefs, validation, and review from source authority."
  - "Library page must support reader paths with provenance and internal routes before repository archaeology."
  - "Resource pages must not render a dedicated source-authority section component."
  - "Update public route/provenance manifests and the review ledger for the four new routes."
  - "Do not add dependencies, push, deploy, refresh upstream sources, regenerate derivatives, or mutate the upstream research repository."

goal: "Complete GF-011 by building the greenfield Resources generated-derivatives, retrieval-layers, publication-process, and library routes under fresh live control."

