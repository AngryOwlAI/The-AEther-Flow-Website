skill_id: implementation-plan-goal
version: 0.3.0
status: template
release_maturity: deprecated
stability: frozen
canonical_path: skills/implementation-plan-goal
summary: Deprecated compatibility launcher that routes new runs to implementation-plan-relay.
installation:
  entrypoint_class: user_workflow
  selection_policy: dependency_resolved
  direct_copy_supported: false
  project_adaptation: package_managed
  recommended_selectors:
    - kind: skill
      id: implementation-plan-relay
  prerequisites:
    bootstrap: explicit_required
    adapters: []
    external_tools: []
scope:
  system_agnostic: true
  target_system_types:
    - governed agentic systems
domain_emphasis:
  - compatibility routing
  - recursive plan relay
required_role_posture:
  - system_analyst
  - system_engineer
  - software_engineer
activation:
  triggers:
    - A caller uses the deprecated implementation-plan-goal name.
  when_not_to_use:
    - A new integration can invoke implementation-plan-relay directly.
inputs:
  required:
    - Inputs required by implementation-plan-relay.
  optional:
    - Explicit read-only legacy inspection selector.
outputs:
  primary:
    - Redirect to implementation-plan-relay with a deprecation warning.
  evidence:
    - Selected recursive profile and canonical target.
dependencies:
  required_skills:
    - implementation-plan-relay
    - continue-implementing-plan-task
  optional_skills: []
  required_skill_versions:
    implementation-plan-relay: ^0.3.0
    continue-implementing-plan-task: ^0.3.0
  python:
    standard_library_only: true
    requires_python: ">=3.11"
    required_packages: []
    optional_packages: []
  external_tools: []
authority:
  may_read:
    - New launcher inputs and read-only legacy status.
  may_write:
    - Nothing independently; all new writes belong to implementation-plan-relay.
  may_not:
    - Create a native Goal, generic outer goal, coordinator, task call, or implicit legacy write.
  canonical_sources:
    - skills/implementation-plan-goal
    - skills/implementation-plan-relay
  generated_derivatives:
    - Installed compatibility shim.
  human_gates:
    - Explicit legacy mutation selection for a named historical run.
validation:
  commands:
    - command: python3 scripts/skills/validate_skill_manifest.py --manifest skills/implementation-plan-goal/skill.yaml
      validator_class: schema_validation
      mode: required
      dry_runnable: true
  validator_classes:
    - schema_validation
    - dependency_validation
    - control_validation
  evidence_required:
    - New calls resolve only to implementation-plan-relay.
handoff:
  requires_completion_receipt: false
  evidence:
    - Canonical target and deprecation warning.
  next_role: implementation_plan_relay_launcher
  open_issue_policy: Fail closed on mixed topology; use read-only legacy status.
execution:
  kind: relay_launcher
  invocation_policy: explicit
  maximum_agentjobs_per_invocation: 0
  may_spawn_threads: true
  may_create_control_records: false
  invokes_skills:
    - implementation-plan-relay
runtime_capabilities:
  provides:
    - sys4ai.implementation-plan-goal.compat-shim.v1
  requires:
    - sys4ai.implementation-plan-relay.runtime.v1
  optional: []
control_protocol:
  profile: registered
  record_types:
    - CompatibilityRedirect
  immutable_after_activation: true
  supersession_required: true
state:
  tracked_root_template: "{project_root}/.agents/control"
  local_root_template: "{project_root}/.local/sys4ai/implementation-plan-relay"
  mutable_state_must_not_live_in_skill_directory: true
compatibility_shims:
  - implementation-plan-relay
adapters:
  required_interfaces:
    - ThreadProvider
  optional_interfaces: []
  manual_thread_fallback: false
recovery:
  supported: false
  automatic_rerun_after_consumption: false
