interface:
  display_name: Continue Goal
  short_description: Launch one durable fresh-discussion goal relay.
policy:
  allow_implicit_invocation: false
  user_invocation: explicit_only
  internal_invocation: forbidden
constraints:
  maximum_agentjobs_per_invocation: 0
  maximum_successors_per_invocation: 1
  may_spawn_threads: true
capabilities:
  - sys4ai.continue-goal.v1
