interface:
  display_name: Continue Implementation Plan Relay
  short_description: Execute and relay one immutable plan generation.
policy:
  allow_implicit_invocation: false
  user_invocation: hidden_by_default
  internal_invocation: token_bound_or_recovery
constraints:
  maximum_continue_invocations: 1
  maximum_agentjobs_per_invocation: 1
  maximum_successors_per_invocation: 1
  same_task_successors: 0
  may_spawn_threads: true
  persistent_coordinator: false
capabilities:
  - sys4ai.continue-implementation-plan-relay.runtime.v1
  - sys4ai.plan-task-receipt.v3

