schema_version: sys4ai.policy-pack.v1
policy_id: aether-research
version: 1.0.0
protocol_range: ^1.0.0
namespace_owner: aether-flow
roles:
  - director-of-research
  - project-system-director
  - process-integrity-auditor
  - ontology-formalizer
  - candidate-constructor
  - refuter
  - smuggling-auditor
  - theoretical-continuation-selector
  - gate-chair
  - project-control-maintainer
  - validator-engineer
  - memory-system-maintainer
  - documentation-curator
  - external-red-team-reviewer
protected_actions:
  - canonical-ontology-edit
  - source-law-adoption
  - physics-claim-promotion
  - benchmark-promotion
  - gate-chair-verdict
  - proof-authority
  - completed-derivation-claim
  - public-release
  - repository-push
  - secret-access
  - irreversible-external-action
human_gate_rules:
  - action: canonical-ontology-edit
    required: true
  - action: source-law-adoption
    required: true
  - action: physics-claim-promotion
    required: true
  - action: benchmark-promotion
    required: true
  - action: gate-chair-verdict
    required: true
  - action: proof-authority
    required: true
  - action: completed-derivation-claim
    required: true
  - action: public-release
    required: true
  - action: repository-push
    required: true
  - action: secret-access
    required: true
  - action: irreversible-external-action
    required: true
source_classes:
  - canonical-control
  - canonical-research-source
  - science-draft
  - project-system-source
  - validation-evidence
  - generated-derivative
  - retrieval-diagnostic
  - external-reference
validator_defaults:
  - memory-preflight
  - schema-validation
  - trace-validation
  - path-allowlist
  - command-result
  - claim-boundary
  - research-control-diff
  - checkpoint
claim_rules:
  process_validation_does_not_imply_domain_truth: true
  scientific_promotion_authority: false
  generated_derivatives_are_authority: false
  registries_are_authority: false
  role_templates_grant_task_permission: false
  handoffs_grant_execution_permission: false
  no_distance_to_gr_change_without_direct_evidence: true
  forbidden_default_conclusions:
    - completed derivation
    - proof authority
    - benchmark promotion
    - Gate Chair verdict
    - canonical ontology adoption
extension_schemas:
  aether.authority:
    owner: aether-flow
    version: 1.0.0
    protocol_range: ^1.0.0
    required: false
    schema_ref: schemas/extensions/aether/aether-authority-extension.schema.json
  aether.physics-completion:
    owner: aether-flow
    version: 1.0.0
    protocol_range: ^1.0.0
    required: false
    schema_ref: schemas/extensions/aether/aether-physics-completion-extension.schema.json
  aether.fingerprint:
    owner: aether-flow
    version: 1.0.0
    protocol_range: ^1.0.0
    required: true
    schema_ref: schemas/extensions/aether/aether-fingerprint-extension.schema.json
extensions:
  aether.policy:
    version: 1.0.0
    required: true
    data:
      system_director_mapping:
        research: director-of-research
        project_system: project-system-director
      role_catalog_roots:
        - .agents/roles/physics
        - .agents/roles/research_ops
      context_provider:
        provider_id: aether-memory-preflight
        command: .venv/bin/python scripts/research_control/continue_research_memory_preflight.py --json
        canonical_source_inspection_required: true
        retrieval_layers_are_non_authoritative: true
      checkpoint_provider:
        provider_id: aether-research-checkpoint
        command_template: ".venv/bin/python scripts/research_control/checkpoint_research_transaction.py --job-id <JOB_ID>"
        legacy_checkpoint_remains_authoritative: true
      physics_completion_schema_ref: .agents/schemas/PHYSICS_COMPLETION_DECISIVENESS_SCHEMA.md
      route_policy_refs:
        - research_control/design/gr_derivation_burden_map.md
        - research_control/design/mathematical_decisiveness_completion_contract.md
      canonical_fingerprint_roots:
        - research_control
        - .agents/schemas
        - .agents/roles
        - registries
      branch_policy:
        legacy_goal_requires_non_main_branch: true
        portable_core_constant: false
      one_outer_job_with_internal_perspectives: true
      historical_goal_records_are_reader_only: true
