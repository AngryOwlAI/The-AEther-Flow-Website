skill_id: agentjob-control
version: 0.3.0
status: template
release_maturity: experimental
stability: evolving
canonical_path: skills/agentjob-control
summary: Portable default-deny control protocol for bounded AgentJobs and governed continuation state.
installation:
  entrypoint_class: support_provider
  selection_policy: advanced_or_dependency
  direct_copy_supported: false
  project_adaptation: required
  recommended_selectors:
    - kind: bundle
      id: governed-continuation
    - kind: bundle
      id: research-control
    - kind: plugin
      id: sys4ai-governed-continuation
  prerequisites:
    bootstrap: optional
    adapters:
      - ProjectAdapter
      - ControlStore
      - RepositoryProvider
      - ThreadExecutionProfileProvider
    external_tools: []
scope:
  system_agnostic: true
  target_system_types:
    - governed agentic systems
    - software repositories
    - research and documentation systems
domain_emphasis:
  - control protocol
  - bounded execution
  - recovery and auditability
required_role_posture:
  - system_analyst
  - system_engineer
  - software_engineer
optional_role_posture:
  - verification_engineer
  - security_engineer
activation:
  triggers:
    - A declared parent skill requires AgentJob control capability.
    - An operator explicitly requests protocol validation or diagnostics.
  when_not_to_use:
    - Ungoverned task execution.
    - Domain promotion without declared evidence and authority.
  preconditions:
    - A compatible project configuration or an explicit bootstrap request exists.
inputs:
  required:
    - Explicit project root.
    - Requested control operation.
  optional:
    - Task or packet identifier.
    - Expected control revision.
    - Adapter and policy-pack configuration.
outputs:
  primary:
    - Structured control result or stable blocking report.
  evidence:
    - Schema, trace, control, command, claim, or human-authority findings as applicable.
dependencies:
  required_skills: []
  optional_skills: []
  required_skill_versions: {}
  python:
    standard_library_only: true
    requires_python: ">=3.11"
    required_packages: []
    optional_packages: []
  external_tools: []
authority:
  may_read:
    - The configured project control, repository, policy, and local state surfaces.
  may_write:
    - Only paths allowed by the requested operation, project policy, and activated AgentJob.
  may_not:
    - Execute unbounded work.
    - Broaden an activated record or role.
    - Publish, deploy, push, merge, or access secrets without exact authority.
    - Present process validation as domain truth.
    - Create or change repository topology without exact one-shot user authority.
    - Persist a v3 non-success terminal without a human-necessity report.
  canonical_sources:
    - skills/agentjob-control
  generated_derivatives:
    - Project-local indexes, snapshots, diagnostics, and generated plugin copies.
  human_gates:
    - Protected actions declared by the target policy pack.
validation:
  commands:
    - command: python3 scripts/skills/validate_control_protocol.py --json
      validator_class: schema_validation
      mode: required
      dry_runnable: true
    - command: python3 skills/agentjob-control/scripts/agentjobctl.py --help
      validator_class: process_validation
      mode: required
      dry_runnable: true
  validator_classes:
    - schema_validation
    - path_validation
    - dependency_validation
    - trace_validation
    - process_validation
    - control_validation
    - command_validation
    - claim_validation
  evidence_required:
    - Exact checks and outcomes.
    - Skipped checks and unresolved gates.
handoff:
  requires_completion_receipt: true
  evidence:
    - Operation, project identity, expected revision, result code, record hashes, and validation findings.
  next_role: system_director
  open_issue_policy: Block rather than broaden authority.
execution:
  kind: support
  invocation_policy: internal
  maximum_agentjobs_per_invocation: 0
  may_spawn_threads: false
  may_create_control_records: true
  invokes_skills: []
runtime_capabilities:
  provides:
    - sys4ai.agentjob-control.v1
    - sys4ai.control-records.v1
    - sys4ai.goal-relay-state-reader.v1
    - sys4ai.goal-relay-state-reader.v2
    - sys4ai.goal-relay-state.v3
    - sys4ai.continuation-envelope.v2
    - sys4ai.thread-provider.v2
    - sys4ai.repository-topology-enforcement.v1
    - sys4ai.plan-activation-receipt.v1
    - sys4ai.plan-execution-profile.v1
    - sys4ai.plan-task-envelope.v2
    - sys4ai.plan-provider-intent.v2
    - sys4ai.plan-task-receipt.v2
    - sys4ai.plan-store.sqlite.v5
    - sys4ai.project-bootstrap.v1
  requires:
    - python>=3.11
  optional:
    - sys4ai.context-provider.v1
    - sys4ai.thread-provider.v1
control_protocol:
  profile: registered
  record_types:
    - Task
    - DirectorDecision
    - ExecutionRole
    - AgentJob
    - Activation
    - Completion
    - Handoff
    - Supersession
    - GoalState
    - GoalStepReceipt
    - ContinuationEnvelope
    - ContinueResult
  immutable_after_activation: true
  supersession_required: true
state:
  tracked_root_template: "{project_root}/.agents/control"
  local_root_template: "{project_root}/.local/sys4ai/continuation"
  mutable_state_must_not_live_in_skill_directory: true
adapters:
  required_interfaces:
    - ProjectAdapter
    - ControlStore
    - RepositoryProvider
  optional_interfaces:
    - CheckpointProvider
    - ContextProvider
    - ThreadProvider
    - ThreadExecutionProfileProvider
  manual_thread_fallback: false
recovery:
  supported: true
  automatic_rerun_after_consumption: false
compatibility_shims: []
failure_modes:
  - mode: Missing configuration or capability.
    recovery: Return bootstrap_required and execute nothing.
  - mode: Revision, hash, path, or authority conflict.
    recovery: Preserve evidence and route a bounded repair or supersession.
