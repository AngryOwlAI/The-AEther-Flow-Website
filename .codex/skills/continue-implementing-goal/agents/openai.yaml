interface:
  display_name: Continue Website Goal Worker
  short_description: Consume one token-bound website goal generation.
policy:
  allow_implicit_invocation: false
  user_invocation: hidden_by_default
  internal_invocation: token_bound_or_recovery
constraints:
  maximum_continue_invocations: 1
  maximum_agentjobs_per_invocation: 1
  maximum_successors_per_invocation: 1
  may_spawn_threads: true
  recovery_supported: true
capabilities:
  - sys4ai.continue-implementing-goal.v1

